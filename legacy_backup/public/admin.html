<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>

  <!-- ===== INTERNAL PREMIUM METALLIC BLUE CSS ===== -->
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:"Poppins","Segoe UI",Arial,sans-serif;
    }

    body{
      min-height:100vh;
      background:
        radial-gradient(circle at top left, #1e3a8a, transparent 40%),
        radial-gradient(circle at bottom right, #020617, transparent 45%),
        linear-gradient(135deg, #020617, #0f172a);
      color:#e5e7eb;
      padding:40px;
    }

    .dashboard{
      max-width:1250px;
      margin:auto;
      padding:36px;
      border-radius:26px;
      background:linear-gradient(
        145deg,
        rgba(30,58,138,0.45),
        rgba(2,6,23,0.85)
      );
      backdrop-filter:blur(22px);
      box-shadow:
        0 40px 90px rgba(0,0,0,0.7),
        inset 0 0 0 1px rgba(147,197,253,0.15);
    }

    .dashboard h1{
      font-size:32px;
      font-weight:600;
      margin-bottom:20px;
      background:linear-gradient(90deg,#93c5fd,#38bdf8,#60a5fa);
      background-clip:text;
      -webkit-background-clip:text;
      color:transparent;
    }

    .stats{
      display:flex;
      gap:20px;
      margin-bottom:25px;
    }

    .stat-card{
      background:linear-gradient(160deg,#1e40af,#020617);
      padding:22px;
      border-radius:18px;
      font-size:18px;
      box-shadow:0 20px 45px rgba(0,0,0,0.5);
    }

    table{
      width:100%;
      border-collapse:separate;
      border-spacing:0;
      background:rgba(2,6,23,0.9);
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 30px 70px rgba(0,0,0,0.6);
    }

    thead{
      background:linear-gradient(90deg,#1e40af,#020617);
    }

    th{
      padding:16px;
      font-size:13px;
      letter-spacing:1px;
      color:#bfdbfe;
      text-transform:uppercase;
    }

    td{
      padding:15px;
      font-size:14px;
      border-bottom:1px solid rgba(255,255,255,0.08);
      text-align:center;
    }

    tbody tr:hover{
      background:rgba(96,165,250,0.08);
    }

    .status-pending{color:#fde68a;font-weight:600;}
    .status-approved{color:#4ade80;font-weight:600;}

    .btn{
      padding:8px 18px;
      border:none;
      border-radius:999px;
      font-size:13px;
      font-weight:600;
      cursor:pointer;
    }

    .btn-approve{
      background:linear-gradient(145deg,#22c55e,#15803d);
      color:#022c22;
    }

    .btn-delete{
      background:linear-gradient(145deg,#ef4444,#991b1b);
      color:white;
      margin-left:6px;
    }

    @media(max-width:900px){
      .stats{flex-direction:column;}
    }
  </style>
</head>

<body>

<div class="dashboard">

  <h1>🚗 Admin Dashboard</h1>

  <div class="stats">
    <div class="stat-card">
      Total Bookings: <span id="totalBookings">0</span>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Car</th>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Date</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="bookingTable"></tbody>
  </table>

</div>

<!-- ===== INTERNAL JS ===== -->
<script>
  let bookings = JSON.parse(localStorage.getItem("bookings")) || [];
  const table = document.getElementById("bookingTable");
  const total = document.getElementById("totalBookings");

  function render(){
    table.innerHTML="";
    total.innerText = bookings.length;

    bookings.forEach((b,i)=>{
      table.innerHTML += `
        <tr>
          <td>${b.car}</td>
          <td>${b.name}</td>
          <td>${b.email}</td>
          <td>${b.phone}</td>
          <td>${b.datetime}</td>
          <td class="${b.status === 'Approved' ? 'status-approved' : 'status-pending'}">
            ${b.status}
          </td>
          <td>
            <button class="btn btn-approve" onclick="approve(${i})">Approve</button>
            <button class="btn btn-delete" onclick="removeB(${i})">Delete</button>
          </td>
        </tr>`;
    });
  }

  function approve(i){
    bookings[i].status="Approved";
    localStorage.setItem("bookings",JSON.stringify(bookings));
    render();
  }

  function removeB(i){
    bookings.splice(i,1);
    localStorage.setItem("bookings",JSON.stringify(bookings));
    render();
  }

  render();
</script>

</body>
</html>
