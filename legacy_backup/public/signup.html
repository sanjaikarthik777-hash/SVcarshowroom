<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signup | Luxury Car Showroom</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;

  background:
    url("https://mir-s3-cdn-cf.behance.net/project_modules/source/46f37945885079.584030cfd603d.gif");

  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

  font-family: 'Poppins', sans-serif;
  color: #fff;
  overflow: hidden;
}

.card{
  width:400px;
  padding:40px;
  background:rgba(255,255,255,0.07);
  backdrop-filter:blur(20px);
  border-radius:22px;
  border:1px solid rgba(212,175,55,0.3);
  box-shadow:0 40px 80px rgba(0,0,0,0.9);
}

h3{
  text-align:center;
  color:#d4af37;
  letter-spacing:3px;
  margin-bottom:30px;
}

.form-control{
  background:rgba(0,0,0,0.6);
  border:1px solid rgba(212,175,55,0.25);
  color:#fff;
  border-radius:14px;
}

.btn-gold{
  background:linear-gradient(135deg,#d4af37,#b8962e);
  border:none;
  color:#000;
  border-radius:30px;
  letter-spacing:2px;
  padding:12px;
}
</style>
</head>

<body>

<div class="card">
  <h3>Create Account</h3>
  <input class="form-control mb-3" placeholder="Full Name">
  <input class="form-control mb-3" placeholder="Email">
  <input class="form-control mb-3" type="password" placeholder="Password">
  <button class="btn btn-gold w-100" onclick="signup()">Sign Up</button>
</div>

<script>
function signup(){
  alert("Account created successfully");
  window.location.href="login.html";
}
</script>

</body>
</html>
